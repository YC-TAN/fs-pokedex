name: Deployment pipeline

on:
    push:
        branches:
            - main

jobs:
    initial_deployment_pipeline:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                node-version: '24'
            - name: Install dependencies
              run: npm install
            - name: Check style with Eslint
              run: npm run eslint